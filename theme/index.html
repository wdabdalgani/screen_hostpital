    <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg,
          #f7fbff 0%,
          #d4e9f7 28%,
          #3498db 58%,
          #2980b9 100%);
      background-attachment: fixed;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 100%;
      padding-inline: 0;
      padding-block: clamp(0.45rem, 2.2vw, 1.1rem) clamp(0.5rem, 2vw, 1.25rem);
    }

    .header {
      width: 100%;
      max-width: 100%;
      text-align: center;
      margin-bottom: clamp(0.2rem, 1.4vw, 0.55rem);
    }

    .logo {
      display: block;
      width: auto;
      height: auto;
      max-width: min(58vw, 368px);
      max-height: 168px;
      object-fit: contain;
      margin-inline: auto;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 100%;
      align-self: stretch;
      min-width: 0;
      padding-bottom: clamp(0.5rem, 2.5vh, 1.25rem);
      box-sizing: border-box;
    }

    .doctor {
      display: block;
      width: 450px;
      max-width: min(68vw, 240px);
      height: 380px;
      /* background-color: black; */
      /* background-attachment: fixed; */
    }

    .doctor img {
      z-index: 100px;
      /* background-color: black; */
    }

    .doctor_shadwo {
      position: relative;
      /* background-color: #3498db; */

    }

    .shadow {
      position: absolute;
      top: 0;

      width: 100%;
      height: 100%;
      /* background-color: #2980b9; */
      background: linear-gradient(180deg,
          #f7fbff00 0%,
          #d4e9f709 28%,
          #3498db11 77%,
          #3498db 100%);
    }

    @media (min-width: 480px) {
      .logo {
        max-width: min(48vw, 200px);
        max-height: 52px;
      }

      .doctor {
        max-width: min(58vw, 360px);
      }
    }

    @media (min-width: 768px) {
      .page {
        padding-inline: 0;
        padding-block: clamp(0.55rem, 2.2vw, 1.1rem) clamp(0.65rem, 2.5vw, 1.5rem);
      }

      .logo {
        max-width: min(38vw, 240px);
        max-height: 56px;
      }

      .doctor {
        max-width: min(85vw, 440px);
      }

     
    }

    @media (orientation: portrait)
     and (min-width: 1000px) and 
     (max-width: 1100px) and (min-height: 1800px)

        }
      }
